<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown To You</title>

  <!-- Elegant fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: white;

      /* YOUR IMAGE */
      background:
        linear-gradient(
          rgba(0,0,0,0.35),
          rgba(0,0,0,0.55)
        ),
        url('./background.png');

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 1200px;
      animation: fadeIn 1.5s ease;
    }

    .heart {
      font-size: 32px;
      color: #ff6b81;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 300;
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .subtitle {
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 60px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .time-box {
      min-width: 160px;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 30px 20px;
      transition: 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .time-box:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.08);
    }

    .number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 300;
      line-height: 1;
    }

    .label {
      margin-top: 10px;
      font-size: 0.9rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .footer {
      margin-top: 70px;
      font-size: 1rem;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .countdown {
        gap: 15px;
      }

      .time-box {
        min-width: 130px;
        padding: 20px 10px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="heart">♡</div>

    <h1>
      Just A Little <br />
      Longer
    </h1>

    <div class="subtitle">
      Until we meet again
    </div>

    <div class="countdown">

      <div class="time-box">
        <div class="number" id="days">00</div>
        <div class="label">Days</div>
      </div>

      <div class="time-box">
        <div class="number" id="hours">00</div>
        <div class="label">Hours</div>
      </div>

      <div class="time-box">
        <div class="number" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>

      <div class="time-box">
        <div class="number" id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>

    </div>

    <div class="footer">
      Every second brings me closer to you ♡
    </div>

  </div>

  <script>
    // SET YOUR DATE HERE
    // June 8 at 9:00 AM
    const targetDate = new Date("June 8, 2026 09:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.querySelector(".container").innerHTML = `
          <h1>We're together ❤️</h1>
        `;
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) /
        (1000 * 60 * 60)
      );

      const minutes = Math.floor(
        (distance % (1000 * 60 * 60)) /
        (1000 * 60)
      );

      const seconds = Math.floor(
        (distance % (1000 * 60)) / 1000
      );

      document.getElementById("days").textContent =
        String(days).padStart(2, "0");

      document.getElementById("hours").textContent =
        String(hours).padStart(2, "0");

      document.getElementById("minutes").textContent =
        String(minutes).padStart(2, "0");

      document.getElementById("seconds").textContent =
        String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
